# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-json
description: Tree-sitter grammar for json.
homepage: https://github.com/tree-sitter/tree-sitter-json
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-json
treesitter:
  build:
    - language: json
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-json
        semver: true

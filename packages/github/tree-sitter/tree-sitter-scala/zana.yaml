# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-scala
description: Tree-sitter grammar for scala.
homepage: https://github.com/tree-sitter/tree-sitter-scala
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-scala
treesitter:
  build:
    - language: scala
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-scala
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-php
description: Tree-sitter grammars for php, php_only.
homepage: https://github.com/tree-sitter/tree-sitter-php
licenses:
  - MIT
languages:
  - php
  - php_only
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-php
treesitter:
  build:
    - language: php
      grammar_dir: php
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-php
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-php_only
          semver: true
    - language: php_only
      grammar_dir: php_only
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-php_only
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

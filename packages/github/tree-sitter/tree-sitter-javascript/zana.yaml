# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-javascript
description: Tree-sitter grammar for javascript.
homepage: https://github.com/tree-sitter/tree-sitter-javascript
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-javascript
treesitter:
  build:
    - language: javascript
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-javascript
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ecma
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-jsx
          semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-jsdoc
description: Tree-sitter grammar for jsdoc.
homepage: https://github.com/tree-sitter/tree-sitter-jsdoc
licenses:
  - MIT
languages:
  - jsdoc
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-jsdoc
treesitter:
  build:
    - language: jsdoc
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-jsdoc
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

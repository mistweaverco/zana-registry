# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-regex
description: Tree-sitter grammar for regex.
homepage: https://github.com/tree-sitter/tree-sitter-regex
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-regex
treesitter:
  build:
    - language: regex
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-regex
        semver: true

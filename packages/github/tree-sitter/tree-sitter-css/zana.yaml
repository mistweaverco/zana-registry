# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-css
description: Tree-sitter grammar for css.
homepage: https://github.com/tree-sitter/tree-sitter-css
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-css
treesitter:
  build:
    - language: css
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-css
        semver: true

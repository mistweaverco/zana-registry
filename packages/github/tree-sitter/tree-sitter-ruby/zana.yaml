# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-ruby
description: Tree-sitter grammar for ruby.
homepage: https://github.com/tree-sitter/tree-sitter-ruby
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-ruby
treesitter:
  build:
    - language: ruby
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ruby
        semver: true

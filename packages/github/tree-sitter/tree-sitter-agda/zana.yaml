# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-agda
description: Tree-sitter grammar for agda.
homepage: https://github.com/tree-sitter/tree-sitter-agda
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-agda
treesitter:
  build:
    - language: agda
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-agda
        semver: true

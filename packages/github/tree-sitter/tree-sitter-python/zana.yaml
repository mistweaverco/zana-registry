# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-python
description: Tree-sitter grammar for python.
homepage: https://github.com/tree-sitter/tree-sitter-python
licenses:
  - MIT
languages:
  - python
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-python
treesitter:
  build:
    - language: python
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-python
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

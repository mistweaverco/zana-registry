# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-c
description: Tree-sitter grammar for c.
homepage: https://github.com/tree-sitter/tree-sitter-c
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-c
treesitter:
  build:
    - language: c
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-c
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-c-sharp
description: Tree-sitter grammar for c_sharp.
homepage: https://github.com/tree-sitter/tree-sitter-c-sharp
licenses:
  - MIT
languages:
  - c_sharp
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-c-sharp
treesitter:
  build:
    - language: c_sharp
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-c_sharp
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-cpp
description: Tree-sitter grammar for cpp.
homepage: https://github.com/tree-sitter/tree-sitter-cpp
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-cpp
treesitter:
  build:
    - language: cpp
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-cpp
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-c
          semver: true

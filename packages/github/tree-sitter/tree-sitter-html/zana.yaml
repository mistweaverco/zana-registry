# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-html
description: Tree-sitter grammar for html.
homepage: https://github.com/tree-sitter/tree-sitter-html
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-html
treesitter:
  build:
    - language: html
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-html
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-html_tags
          semver: true

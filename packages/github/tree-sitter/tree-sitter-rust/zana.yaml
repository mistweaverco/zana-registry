# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-rust
description: Tree-sitter grammar for rust.
homepage: https://github.com/tree-sitter/tree-sitter-rust
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-rust
treesitter:
  build:
    - language: rust
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-rust
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-java
description: Tree-sitter grammar for java.
homepage: https://github.com/tree-sitter/tree-sitter-java
licenses:
  - MIT
languages:
  - java
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-java
treesitter:
  build:
    - language: java
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-java
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

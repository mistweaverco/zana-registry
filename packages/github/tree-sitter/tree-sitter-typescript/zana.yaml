# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-typescript
description: Tree-sitter grammars for ecma, jsx, tsx, typescript.
homepage: https://github.com/tree-sitter/tree-sitter-typescript
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-typescript
treesitter:
  build:
    - language: ecma
      integrations:
        - neovim
      queries_only: true
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ecma
        semver: true
    - language: jsx
      integrations:
        - neovim
      queries_only: true
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-jsx
        semver: true
    - language: tsx
      grammar_dir: tsx
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-tsx
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-typescript
          semver: true
    - language: typescript
      grammar_dir: typescript
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-typescript
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-go
description: Tree-sitter grammar for go.
homepage: https://github.com/tree-sitter/tree-sitter-go
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter/tree-sitter-go
treesitter:
  build:
    - language: go
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-go
        semver: true

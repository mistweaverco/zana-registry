# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-c3
description: Tree-sitter grammar for c3.
homepage: https://github.com/c3lang/tree-sitter-c3
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:c3lang/tree-sitter-c3
treesitter:
  build:
    - language: c3
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-c3
        semver: true

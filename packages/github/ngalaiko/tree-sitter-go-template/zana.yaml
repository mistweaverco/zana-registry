# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-go-template
description: Tree-sitter grammars for gotmpl, helm.
homepage: https://github.com/ngalaiko/tree-sitter-go-template
licenses:
  - MIT
languages:
  - gotmpl
  - helm
categories:
  - Tree-sitter-parser
source:
  id: github:ngalaiko/tree-sitter-go-template
treesitter:
  build:
    - language: gotmpl
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-gotmpl
        semver: true
    - language: helm
      grammar_dir: dialects/helm
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-helm
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

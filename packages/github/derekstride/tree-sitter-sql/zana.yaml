# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-sql
description: Tree-sitter grammar for sql.
homepage: https://github.com/derekstride/tree-sitter-sql
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:derekstride/tree-sitter-sql
treesitter:
  build:
    - language: sql
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-sql
        semver: true

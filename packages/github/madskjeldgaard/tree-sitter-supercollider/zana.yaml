# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-supercollider
description: Tree-sitter grammar for supercollider.
homepage: https://github.com/madskjeldgaard/tree-sitter-supercollider
licenses:
  - MIT
languages:
  - supercollider
categories:
  - Tree-sitter-parser
source:
  id: github:madskjeldgaard/tree-sitter-supercollider
treesitter:
  build:
    - language: supercollider
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-supercollider
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-jq
description: Tree-sitter grammar for jq.
homepage: https://github.com/flurie/tree-sitter-jq
licenses:
  - MIT
languages:
  - jq
categories:
  - Tree-sitter-parser
source:
  id: github:flurie/tree-sitter-jq
treesitter:
  build:
    - language: jq
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-jq
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

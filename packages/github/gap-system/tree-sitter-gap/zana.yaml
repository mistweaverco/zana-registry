# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-gap
description: Tree-sitter grammar for gap.
homepage: https://github.com/gap-system/tree-sitter-gap
licenses:
  - MIT
languages:
  - gap
categories:
  - Tree-sitter-parser
source:
  id: github:gap-system/tree-sitter-gap
treesitter:
  build:
    - language: gap
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-gap
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-idris
description: Tree-sitter grammar for idris.
homepage: https://github.com/kayhide/tree-sitter-idris
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:kayhide/tree-sitter-idris
treesitter:
  build:
    - language: idris
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-idris
        semver: true

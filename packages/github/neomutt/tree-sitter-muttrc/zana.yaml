# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-muttrc
description: Tree-sitter grammar for muttrc.
homepage: https://github.com/neomutt/tree-sitter-muttrc
licenses:
  - MIT
languages:
  - muttrc
categories:
  - Tree-sitter-parser
source:
  id: github:neomutt/tree-sitter-muttrc
treesitter:
  build:
    - language: muttrc
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-muttrc
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-authzed
description: Tree-sitter grammar for authzed.
homepage: https://github.com/mleonidas/tree-sitter-authzed
licenses:
  - MIT
languages:
  - authzed
categories:
  - Tree-sitter-parser
source:
  id: github:mleonidas/tree-sitter-authzed
treesitter:
  build:
    - language: authzed
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-authzed
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

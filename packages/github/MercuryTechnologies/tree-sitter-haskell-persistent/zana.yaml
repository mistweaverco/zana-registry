# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-haskell-persistent
description: Tree-sitter grammar for haskell_persistent.
homepage: https://github.com/MercuryTechnologies/tree-sitter-haskell-persistent
licenses:
  - MIT
languages:
  - haskell_persistent
categories:
  - Tree-sitter-parser
source:
  id: github:MercuryTechnologies/tree-sitter-haskell-persistent
treesitter:
  build:
    - language: haskell_persistent
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-haskell_persistent
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

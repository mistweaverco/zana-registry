# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-surface
description: Tree-sitter grammar for surface.
homepage: https://github.com/connorlay/tree-sitter-surface
licenses:
  - MIT
languages:
  - surface
categories:
  - Tree-sitter-parser
source:
  id: github:connorlay/tree-sitter-surface
treesitter:
  build:
    - language: surface
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-surface
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

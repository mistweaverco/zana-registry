# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-dockerfile
description: Tree-sitter grammar for dockerfile.
homepage: https://github.com/camdencheek/tree-sitter-dockerfile
licenses:
  - MIT
languages:
  - dockerfile
categories:
  - Tree-sitter-parser
source:
  id: github:camdencheek/tree-sitter-dockerfile
treesitter:
  build:
    - language: dockerfile
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-dockerfile
        semver: true
      injections:
        - bash
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-wit
description: Tree-sitter grammar for wit.
homepage: https://github.com/bytecodealliance/tree-sitter-wit
licenses:
  - MIT
languages:
  - wit
categories:
  - Tree-sitter-parser
source:
  id: github:bytecodealliance/tree-sitter-wit
treesitter:
  build:
    - language: wit
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-wit
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-smithy
description: Tree-sitter grammar for smithy.
homepage: https://github.com/indoorvivants/tree-sitter-smithy
licenses:
  - MIT
languages:
  - smithy
categories:
  - Tree-sitter-parser
source:
  id: github:indoorvivants/tree-sitter-smithy
treesitter:
  build:
    - language: smithy
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-smithy
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

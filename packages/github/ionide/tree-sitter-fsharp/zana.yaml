# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-fsharp
description: Tree-sitter grammar for fsharp.
homepage: https://github.com/ionide/tree-sitter-fsharp
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:ionide/tree-sitter-fsharp
treesitter:
  build:
    - language: fsharp
      grammar_dir: fsharp
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-fsharp
        semver: true

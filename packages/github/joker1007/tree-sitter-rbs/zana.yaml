# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-rbs
description: Tree-sitter grammar for rbs.
homepage: https://github.com/joker1007/tree-sitter-rbs
licenses:
  - MIT
languages:
  - rbs
categories:
  - Tree-sitter-parser
source:
  id: github:joker1007/tree-sitter-rbs
treesitter:
  build:
    - language: rbs
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-rbs
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

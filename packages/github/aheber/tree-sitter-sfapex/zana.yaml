# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-sfapex
description: Tree-sitter grammars for apex, sflog, soql, sosl.
homepage: https://github.com/aheber/tree-sitter-sfapex
licenses:
  - MIT
languages:
  - apex
  - sflog
  - soql
  - sosl
categories:
  - Tree-sitter-parser
source:
  id: github:aheber/tree-sitter-sfapex
treesitter:
  build:
    - language: apex
      grammar_dir: apex
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-apex
        semver: true
    - language: sflog
      grammar_dir: sflog
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-sflog
        semver: true
    - language: soql
      grammar_dir: soql
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-soql
        semver: true
    - language: sosl
      grammar_dir: sosl
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-sosl
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

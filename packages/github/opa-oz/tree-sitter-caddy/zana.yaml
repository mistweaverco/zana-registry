# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-caddy
description: Tree-sitter grammar for caddy.
homepage: https://github.com/opa-oz/tree-sitter-caddy
licenses:
  - MIT
languages:
  - caddy
categories:
  - Tree-sitter-parser
source:
  id: github:opa-oz/tree-sitter-caddy
treesitter:
  build:
    - language: caddy
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-caddy
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-groovy
description: Tree-sitter grammar for groovy.
homepage: https://github.com/murtaza64/tree-sitter-groovy
licenses:
  - MIT
languages:
  - groovy
categories:
  - Tree-sitter-parser
source:
  id: github:murtaza64/tree-sitter-groovy
treesitter:
  build:
    - language: groovy
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-groovy
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

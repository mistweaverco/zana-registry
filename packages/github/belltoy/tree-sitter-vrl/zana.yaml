# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-vrl
description: Tree-sitter grammar for vrl.
homepage: https://github.com/belltoy/tree-sitter-vrl
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:belltoy/tree-sitter-vrl
treesitter:
  build:
    - language: vrl
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-vrl
        semver: true

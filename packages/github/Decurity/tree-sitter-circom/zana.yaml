# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-circom
description: Tree-sitter grammar for circom.
homepage: https://github.com/Decurity/tree-sitter-circom
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:Decurity/tree-sitter-circom
treesitter:
  build:
    - language: circom
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-circom
        semver: true

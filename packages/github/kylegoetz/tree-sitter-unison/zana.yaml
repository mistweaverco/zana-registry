# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-unison
description: Tree-sitter grammar for unison.
homepage: https://github.com/kylegoetz/tree-sitter-unison
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:kylegoetz/tree-sitter-unison
treesitter:
  build:
    - language: unison
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-unison
        semver: true

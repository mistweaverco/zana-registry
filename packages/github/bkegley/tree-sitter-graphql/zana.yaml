# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-graphql
description: Tree-sitter grammar for graphql.
homepage: https://github.com/bkegley/tree-sitter-graphql
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:bkegley/tree-sitter-graphql
treesitter:
  build:
    - language: graphql
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-graphql
        semver: true

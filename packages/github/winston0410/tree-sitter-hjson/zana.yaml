# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-hjson
description: Tree-sitter grammar for hjson.
homepage: https://github.com/winston0410/tree-sitter-hjson
licenses:
  - MIT
languages:
  - hjson
categories:
  - Tree-sitter-parser
source:
  id: github:winston0410/tree-sitter-hjson
treesitter:
  build:
    - language: hjson
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-hjson
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-json
          semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-fsh
description: Tree-sitter grammar for fsh.
homepage: https://github.com/mgramigna/tree-sitter-fsh
licenses:
  - MIT
languages:
  - fsh
categories:
  - Tree-sitter-parser
source:
  id: github:mgramigna/tree-sitter-fsh
treesitter:
  build:
    - language: fsh
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-fsh
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

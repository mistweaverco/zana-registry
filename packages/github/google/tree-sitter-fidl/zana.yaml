# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-fidl
description: Tree-sitter grammar for fidl.
homepage: https://github.com/google/tree-sitter-fidl
licenses:
  - MIT
languages:
  - fidl
categories:
  - Tree-sitter-parser
source:
  id: github:google/tree-sitter-fidl
treesitter:
  build:
    - language: fidl
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-fidl
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-elvish
description: Tree-sitter grammar for elvish.
homepage: https://github.com/elves/tree-sitter-elvish
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:elves/tree-sitter-elvish
treesitter:
  build:
    - language: elvish
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-elvish
        semver: true

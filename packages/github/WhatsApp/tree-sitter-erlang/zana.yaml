# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-erlang
description: Tree-sitter grammar for erlang.
homepage: https://github.com/WhatsApp/tree-sitter-erlang
licenses:
  - MIT
languages:
  - erlang
categories:
  - Tree-sitter-parser
source:
  id: github:WhatsApp/tree-sitter-erlang
treesitter:
  build:
    - language: erlang
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-erlang
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-nim
description: Tree-sitter grammar for nim.
homepage: https://github.com/alaviss/tree-sitter-nim
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:alaviss/tree-sitter-nim
treesitter:
  build:
    - language: nim
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-nim
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-hcl
description: Tree-sitter grammar for hcl and terraform.
homepage: https://github.com/MichaHoffmann/tree-sitter-hcl
licenses:
  - MIT
languages:
  - terraform
  - hcl
categories:
  - Tree-sitter-parser
source:
  id: github:MichaHoffmann/tree-sitter-hcl
treesitter:
  build:
    - language: terraform
      grammar_dir: dialects/terraform
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-terraform
        semver: true
    - language: hcl
      grammar_dir: dialects/terraform
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-hcl
        semver: true

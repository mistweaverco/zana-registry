# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-promql
description: Tree-sitter grammar for promql.
homepage: https://github.com/MichaHoffmann/tree-sitter-promql
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:MichaHoffmann/tree-sitter-promql
treesitter:
  build:
    - language: promql
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-promql
        semver: true

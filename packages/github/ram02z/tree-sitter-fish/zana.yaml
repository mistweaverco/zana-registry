# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-fish
description: Tree-sitter grammar for fish.
homepage: https://github.com/ram02z/tree-sitter-fish
licenses:
  - MIT
languages:
  - fish
categories:
  - Tree-sitter-parser
source:
  id: github:ram02z/tree-sitter-fish
treesitter:
  build:
    - language: fish
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-fish
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

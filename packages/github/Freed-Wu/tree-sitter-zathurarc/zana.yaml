# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-zathurarc
description: Tree-sitter grammar for zathurarc.
homepage: https://github.com/Freed-Wu/tree-sitter-zathurarc
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:Freed-Wu/tree-sitter-zathurarc
treesitter:
  build:
    - language: zathurarc
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-zathurarc
        semver: true

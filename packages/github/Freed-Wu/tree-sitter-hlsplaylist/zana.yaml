# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-hlsplaylist
description: Tree-sitter grammar for hlsplaylist.
homepage: https://github.com/Freed-Wu/tree-sitter-hlsplaylist
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:Freed-Wu/tree-sitter-hlsplaylist
treesitter:
  build:
    - language: hlsplaylist
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-hlsplaylist
        semver: true

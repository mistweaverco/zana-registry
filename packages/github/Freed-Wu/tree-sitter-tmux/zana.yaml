# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-tmux
description: Tree-sitter grammar for tmux.
homepage: https://github.com/Freed-Wu/tree-sitter-tmux
licenses:
  - MIT
languages:
  - tmux
categories:
  - Tree-sitter-parser
source:
  id: github:Freed-Wu/tree-sitter-tmux
treesitter:
  build:
    - language: tmux
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-tmux
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

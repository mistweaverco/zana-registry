# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-solidity
description: Tree-sitter grammar for solidity.
homepage: https://github.com/JoranHonig/tree-sitter-solidity
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:JoranHonig/tree-sitter-solidity
treesitter:
  build:
    - language: solidity
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-solidity
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-lalrpop
description: Tree-sitter grammar for lalrpop.
homepage: https://github.com/traxys/tree-sitter-lalrpop
licenses:
  - MIT
languages:
  - lalrpop
categories:
  - Tree-sitter-parser
source:
  id: github:traxys/tree-sitter-lalrpop
treesitter:
  build:
    - language: lalrpop
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-lalrpop
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

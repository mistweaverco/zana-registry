# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-inko
description: Tree-sitter grammar for inko.
homepage: https://github.com/inko-lang/tree-sitter-inko
licenses:
  - MIT
languages:
  - inko
categories:
  - Tree-sitter-parser
source:
  id: github:inko-lang/tree-sitter-inko
treesitter:
  build:
    - language: inko
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-inko
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-scss
description: Tree-sitter grammar for scss.
homepage: https://github.com/serenadeai/tree-sitter-scss
licenses:
  - MIT
languages:
  - scss
categories:
  - Tree-sitter-parser
source:
  id: github:serenadeai/tree-sitter-scss
treesitter:
  build:
    - language: scss
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-scss
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-css
          semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-gitignore
description: Tree-sitter grammar for gitignore.
homepage: https://github.com/shunsambongi/tree-sitter-gitignore
licenses:
  - MIT
languages:
  - gitignore
categories:
  - Tree-sitter-parser
source:
  id: github:shunsambongi/tree-sitter-gitignore
treesitter:
  build:
    - language: gitignore
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-gitignore
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

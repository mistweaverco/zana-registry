# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-gitcommit
description: Tree-sitter grammar for gitcommit.
homepage: https://github.com/gbprod/tree-sitter-gitcommit
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:gbprod/tree-sitter-gitcommit
treesitter:
  build:
    - language: gitcommit
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-gitcommit
        semver: true

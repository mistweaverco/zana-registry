# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-astro
description: Tree-sitter grammars for astro, html_tags.
homepage: https://github.com/virchau13/tree-sitter-astro
licenses:
  - MIT
languages:
  - astro
  - html_tags
categories:
  - Tree-sitter-parser
source:
  id: github:virchau13/tree-sitter-astro
treesitter:
  build:
    - language: astro
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-astro
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-html
          semver: true
    - language: html_tags
      integrations:
        - neovim
      queries_only: true
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-html_tags
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-http
description: Tree-sitter grammar for http.
homepage: https://github.com/rest-nvim/tree-sitter-http
licenses:
  - MIT
languages:
  - http
categories:
  - Tree-sitter-parser
source:
  id: github:rest-nvim/tree-sitter-http
treesitter:
  build:
    - language: http
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-http
        semver: true
      injections:
        - javascript
        - lua
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

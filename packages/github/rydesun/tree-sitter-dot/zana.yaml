# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-dot
description: Tree-sitter grammar for dot.
homepage: https://github.com/rydesun/tree-sitter-dot
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:rydesun/tree-sitter-dot
treesitter:
  build:
    - language: dot
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-dot
        semver: true

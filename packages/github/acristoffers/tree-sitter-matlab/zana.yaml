# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-matlab
description: Tree-sitter grammar for matlab.
homepage: https://github.com/acristoffers/tree-sitter-matlab
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:acristoffers/tree-sitter-matlab
treesitter:
  build:
    - language: matlab
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-matlab
        semver: true

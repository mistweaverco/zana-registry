# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-rasi
description: Tree-sitter grammar for rasi.
homepage: https://github.com/Fymyte/tree-sitter-rasi
licenses:
  - MIT
languages:
  - rasi
categories:
  - Tree-sitter-parser
source:
  id: github:Fymyte/tree-sitter-rasi
treesitter:
  build:
    - language: rasi
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-rasi
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

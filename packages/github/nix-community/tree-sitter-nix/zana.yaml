# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-nix
description: Tree-sitter grammar for nix.
homepage: https://github.com/nix-community/tree-sitter-nix
licenses:
  - MIT
languages:
  - nix
categories:
  - Tree-sitter-parser
source:
  id: github:nix-community/tree-sitter-nix
treesitter:
  build:
    - language: nix
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-nix
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-bpftrace
description: Tree-sitter grammar for bpftrace.
homepage: https://github.com/sgruszka/tree-sitter-bpftrace
licenses:
  - MIT
languages:
  - bpftrace
categories:
  - Tree-sitter-parser
source:
  id: github:sgruszka/tree-sitter-bpftrace
treesitter:
  build:
    - language: bpftrace
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-bpftrace
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-ini
description: Tree-sitter grammar for ini.
homepage: https://github.com/justinmk/tree-sitter-ini
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:justinmk/tree-sitter-ini
treesitter:
  build:
    - language: ini
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ini
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-mermaid
description: Tree-sitter grammar for mermaid.
homepage: https://github.com/monaqa/tree-sitter-mermaid
licenses:
  - MIT
languages:
  - mermaid
categories:
  - Tree-sitter-parser
source:
  id: github:monaqa/tree-sitter-mermaid
treesitter:
  build:
    - language: mermaid
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-mermaid
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

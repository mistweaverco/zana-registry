# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-roc
description: Tree-sitter grammar for roc.
homepage: https://github.com/faldor20/tree-sitter-roc
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:faldor20/tree-sitter-roc
treesitter:
  build:
    - language: roc
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-roc
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-jinja
description: Tree-sitter grammars for jinja, jinja_inline.
homepage: https://github.com/cathaysia/tree-sitter-jinja
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:cathaysia/tree-sitter-jinja
treesitter:
  build:
    - language: jinja
      grammar_dir: tree-sitter-jinja
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-jinja
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-jinja_inline
          semver: true
    - language: jinja_inline
      grammar_dir: tree-sitter-jinja_inline
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-jinja_inline
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-djot
description: Tree-sitter grammar for djot.
homepage: https://github.com/treeman/tree-sitter-djot
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:treeman/tree-sitter-djot
treesitter:
  build:
    - language: djot
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-djot
        semver: true

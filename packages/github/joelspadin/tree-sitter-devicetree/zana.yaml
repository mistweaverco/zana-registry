# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-devicetree
description: Tree-sitter grammar for devicetree.
homepage: https://github.com/joelspadin/tree-sitter-devicetree
licenses:
  - MIT
languages:
  - devicetree
categories:
  - Tree-sitter-parser
source:
  id: github:joelspadin/tree-sitter-devicetree
treesitter:
  build:
    - language: devicetree
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-devicetree
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

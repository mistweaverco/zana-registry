# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-editorconfig
description: Tree-sitter grammar for editorconfig.
homepage: https://github.com/ValdezFOmar/tree-sitter-editorconfig
licenses:
  - MIT
languages:
  - editorconfig
categories:
  - Tree-sitter-parser
source:
  id: github:ValdezFOmar/tree-sitter-editorconfig
treesitter:
  build:
    - language: editorconfig
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-editorconfig
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-facility
description: Tree-sitter grammar for facility.
homepage: https://github.com/FacilityApi/tree-sitter-facility
licenses:
  - MIT
languages:
  - facility
categories:
  - Tree-sitter-parser
source:
  id: github:FacilityApi/tree-sitter-facility
treesitter:
  build:
    - language: facility
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-facility
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

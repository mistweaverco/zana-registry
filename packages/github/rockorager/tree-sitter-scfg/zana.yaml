# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-scfg
description: Tree-sitter grammar for scfg.
homepage: https://github.com/rockorager/tree-sitter-scfg
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:rockorager/tree-sitter-scfg
treesitter:
  build:
    - language: scfg
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-scfg
        semver: true

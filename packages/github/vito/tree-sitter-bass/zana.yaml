# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-bass
description: Tree-sitter grammar for bass.
homepage: https://github.com/vito/tree-sitter-bass
licenses:
  - MIT
languages:
  - bass
categories:
  - Tree-sitter-parser
source:
  id: github:vito/tree-sitter-bass
treesitter:
  build:
    - language: bass
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-bass
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

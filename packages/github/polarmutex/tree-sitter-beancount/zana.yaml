# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-beancount
description: Tree-sitter grammar for beancount.
homepage: https://github.com/polarmutex/tree-sitter-beancount
licenses:
  - MIT
languages:
  - beancount
categories:
  - Tree-sitter-parser
source:
  id: github:polarmutex/tree-sitter-beancount
treesitter:
  build:
    - language: beancount
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-beancount
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

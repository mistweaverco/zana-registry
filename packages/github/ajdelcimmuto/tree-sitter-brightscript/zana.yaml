# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-brightscript
description: Tree-sitter grammar for brightscript.
homepage: https://github.com/ajdelcimmuto/tree-sitter-brightscript
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:ajdelcimmuto/tree-sitter-brightscript
treesitter:
  build:
    - language: brightscript
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-brightscript
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-groq
description: Tree-sitter grammar for groq.
homepage: https://github.com/ajrussellaudio/tree-sitter-groq
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:ajrussellaudio/tree-sitter-groq
treesitter:
  build:
    - language: groq
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-groq
        semver: true

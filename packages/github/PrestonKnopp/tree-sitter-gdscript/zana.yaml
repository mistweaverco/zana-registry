# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-gdscript
description: Tree-sitter grammar for gdscript.
homepage: https://github.com/PrestonKnopp/tree-sitter-gdscript
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:PrestonKnopp/tree-sitter-gdscript
treesitter:
  build:
    - language: gdscript
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-gdscript
        semver: true

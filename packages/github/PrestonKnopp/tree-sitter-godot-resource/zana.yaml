# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-godot-resource
description: Tree-sitter grammar for godot_resource.
homepage: https://github.com/PrestonKnopp/tree-sitter-godot-resource
licenses:
  - MIT
languages:
  - godot_resource
categories:
  - Tree-sitter-parser
source:
  id: github:PrestonKnopp/tree-sitter-godot-resource
treesitter:
  build:
    - language: godot_resource
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-godot_resource
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

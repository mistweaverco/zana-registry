# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-phpdoc
description: Tree-sitter grammar for phpdoc.
homepage: https://github.com/claytonrcarter/tree-sitter-phpdoc
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:claytonrcarter/tree-sitter-phpdoc
treesitter:
  build:
    - language: phpdoc
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-phpdoc
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-kos
description: Tree-sitter grammar for kos.
homepage: https://github.com/kos-lang/tree-sitter-kos
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:kos-lang/tree-sitter-kos
treesitter:
  build:
    - language: kos
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-kos
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-ninja
description: Tree-sitter grammar for ninja.
homepage: https://github.com/alemuller/tree-sitter-ninja
licenses:
  - MIT
languages:
  - ninja
categories:
  - Tree-sitter-parser
source:
  id: github:alemuller/tree-sitter-ninja
treesitter:
  build:
    - language: ninja
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ninja
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

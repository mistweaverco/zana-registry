# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-ralph
description: Tree-sitter grammar for ralph.
homepage: https://github.com/alephium/tree-sitter-ralph
licenses:
  - MIT
languages:
  - ralph
categories:
  - Tree-sitter-parser
source:
  id: github:alephium/tree-sitter-ralph
treesitter:
  build:
    - language: ralph
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ralph
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

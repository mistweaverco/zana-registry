# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-styled
description: Tree-sitter grammar for styled.
homepage: https://github.com/mskelton/tree-sitter-styled
licenses:
  - MIT
languages:
  - styled
categories:
  - Tree-sitter-parser
source:
  id: github:mskelton/tree-sitter-styled
treesitter:
  build:
    - language: styled
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-styled
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

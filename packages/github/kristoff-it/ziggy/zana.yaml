# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: ziggy
description: Tree-sitter grammars for ziggy, ziggy_schema.
homepage: https://github.com/kristoff-it/ziggy
licenses:
  - MIT
languages:
  - ziggy
  - ziggy_schema
categories:
  - Tree-sitter-parser
source:
  id: github:kristoff-it/ziggy
treesitter:
  build:
    - language: ziggy
      grammar_dir: tree-sitter-ziggy
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ziggy
        semver: true
    - language: ziggy_schema
      grammar_dir: tree-sitter-ziggy-schema
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ziggy_schema
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

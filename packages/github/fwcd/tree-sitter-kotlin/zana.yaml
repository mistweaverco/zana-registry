# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-kotlin
description: Tree-sitter grammar for kotlin.
homepage: https://github.com/fwcd/tree-sitter-kotlin
licenses:
  - MIT
languages:
  - kotlin
categories:
  - Tree-sitter-parser
source:
  id: github:fwcd/tree-sitter-kotlin
treesitter:
  build:
    - language: kotlin
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-kotlin
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

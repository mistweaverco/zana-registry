# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-rnoweb
description: Tree-sitter grammar for rnoweb.
homepage: https://github.com/bamonroe/tree-sitter-rnoweb
licenses:
  - MIT
languages:
  - rnoweb
categories:
  - Tree-sitter-parser
source:
  id: github:bamonroe/tree-sitter-rnoweb
treesitter:
  build:
    - language: rnoweb
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-rnoweb
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

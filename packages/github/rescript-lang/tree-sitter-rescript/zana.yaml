# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-rescript
description: Tree-sitter grammar for rescript.
homepage: https://github.com/rescript-lang/tree-sitter-rescript
licenses:
  - MIT
languages:
  - rescript
categories:
  - Tree-sitter-parser
source:
  id: github:rescript-lang/tree-sitter-rescript
treesitter:
  build:
    - language: rescript
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-rescript
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

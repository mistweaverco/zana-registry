# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-dhall
description: Tree-sitter grammar for dhall.
homepage: https://github.com/jbellerb/tree-sitter-dhall
licenses:
  - MIT
languages:
  - dhall
categories:
  - Tree-sitter-parser
source:
  id: github:jbellerb/tree-sitter-dhall
treesitter:
  build:
    - language: dhall
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-dhall
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

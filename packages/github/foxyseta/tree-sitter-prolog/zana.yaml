# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-prolog
description: Tree-sitter grammars for problog, prolog.
homepage: https://github.com/foxyseta/tree-sitter-prolog
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:foxyseta/tree-sitter-prolog
treesitter:
  build:
    - language: problog
      grammar_dir: grammars/problog
    - language: prolog
      grammar_dir: grammars/prolog

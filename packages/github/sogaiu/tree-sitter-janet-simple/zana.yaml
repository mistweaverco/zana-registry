# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-janet-simple
description: Tree-sitter grammar for janet_simple.
homepage: https://github.com/sogaiu/tree-sitter-janet-simple
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:sogaiu/tree-sitter-janet-simple
treesitter:
  build:
    - language: janet_simple
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-janet_simple
        semver: true

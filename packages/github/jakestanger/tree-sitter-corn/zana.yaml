# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-corn
description: Tree-sitter grammar for corn.
homepage: https://github.com/jakestanger/tree-sitter-corn
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:jakestanger/tree-sitter-corn
treesitter:
  build:
    - language: corn
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-corn
        semver: true

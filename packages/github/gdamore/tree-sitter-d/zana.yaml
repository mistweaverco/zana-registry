# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-d
description: Tree-sitter grammar for d.
homepage: https://github.com/gdamore/tree-sitter-d
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:gdamore/tree-sitter-d
treesitter:
  build:
    - language: d
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-d
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-mlir
description: Tree-sitter grammar for mlir.
homepage: https://github.com/artagnon/tree-sitter-mlir
licenses:
  - MIT
languages:
  - mlir
categories:
  - Tree-sitter-parser
source:
  id: github:artagnon/tree-sitter-mlir
treesitter:
  build:
    - language: mlir
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-mlir
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

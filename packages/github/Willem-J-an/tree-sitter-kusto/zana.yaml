# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-kusto
description: Tree-sitter grammar for kusto.
homepage: https://github.com/Willem-J-an/tree-sitter-kusto
licenses:
  - MIT
languages:
  - kusto
categories:
  - Tree-sitter-parser
source:
  id: github:Willem-J-an/tree-sitter-kusto
treesitter:
  build:
    - language: kusto
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-kusto
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-json5
description: Tree-sitter grammar for json5.
homepage: https://github.com/Joakker/tree-sitter-json5
licenses:
  - MIT
languages:
  - json5
categories:
  - Tree-sitter-parser
source:
  id: github:Joakker/tree-sitter-json5
treesitter:
  build:
    - language: json5
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-json5
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

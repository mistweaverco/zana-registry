# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-koto
description: Tree-sitter grammar for koto.
homepage: https://github.com/koto-lang/tree-sitter-koto
licenses:
  - MIT
languages:
  - koto
categories:
  - Tree-sitter-parser
source:
  id: github:koto-lang/tree-sitter-koto
treesitter:
  build:
    - language: koto
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-koto
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

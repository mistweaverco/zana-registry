# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-latex
description: Tree-sitter grammar for latex.
homepage: https://github.com/latex-lsp/tree-sitter-latex
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:latex-lsp/tree-sitter-latex
treesitter:
  build:
    - language: latex
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-latex
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-bibtex
description: Tree-sitter grammar for bibtex.
homepage: https://github.com/latex-lsp/tree-sitter-bibtex
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:latex-lsp/tree-sitter-bibtex
treesitter:
  build:
    - language: bibtex
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-bibtex
        semver: true

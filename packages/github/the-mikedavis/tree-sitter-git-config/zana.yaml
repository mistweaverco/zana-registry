# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-git-config
description: Tree-sitter grammar for git_config.
homepage: https://github.com/the-mikedavis/tree-sitter-git-config
licenses:
  - MIT
languages:
  - git_config
categories:
  - Tree-sitter-parser
source:
  id: github:the-mikedavis/tree-sitter-git-config
treesitter:
  build:
    - language: git_config
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-git_config
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-ocamllex
description: Tree-sitter grammar for ocamllex.
homepage: https://github.com/atom-ocaml/tree-sitter-ocamllex
licenses:
  - MIT
languages:
  - ocamllex
categories:
  - Tree-sitter-parser
source:
  id: github:atom-ocaml/tree-sitter-ocamllex
treesitter:
  build:
    - language: ocamllex
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ocamllex
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

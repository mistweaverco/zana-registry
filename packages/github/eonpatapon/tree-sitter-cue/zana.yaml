# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-cue
description: Tree-sitter grammar for cue.
homepage: https://github.com/eonpatapon/tree-sitter-cue
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:eonpatapon/tree-sitter-cue
treesitter:
  build:
    - language: cue
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-cue
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-purescript
description: Tree-sitter grammar for purescript.
homepage: https://github.com/postsolar/tree-sitter-purescript
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:postsolar/tree-sitter-purescript
treesitter:
  build:
    - language: purescript
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-purescript
        semver: true

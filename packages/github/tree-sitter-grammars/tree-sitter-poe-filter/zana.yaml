# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-poe-filter
description: Tree-sitter grammar for poe_filter.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-poe-filter
licenses:
  - MIT
languages:
  - poe_filter
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-poe-filter
treesitter:
  build:
    - language: poe_filter
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-poe_filter
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-arduino
description: Tree-sitter grammar for arduino.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-arduino
licenses:
  - MIT
languages:
  - arduino
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-arduino
treesitter:
  build:
    - language: arduino
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-arduino
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-cpp
          semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-gstlaunch
description: Tree-sitter grammar for gstlaunch.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-gstlaunch
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-gstlaunch
treesitter:
  build:
    - language: gstlaunch
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-gstlaunch
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-properties
description: Tree-sitter grammar for properties.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-properties
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-properties
treesitter:
  build:
    - language: properties
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-properties
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-squirrel
description: Tree-sitter grammar for squirrel.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-squirrel
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-squirrel
treesitter:
  build:
    - language: squirrel
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-squirrel
        semver: true

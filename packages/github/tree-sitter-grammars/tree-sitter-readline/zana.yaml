# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-readline
description: Tree-sitter grammar for readline.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-readline
licenses:
  - MIT
languages:
  - readline
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-readline
treesitter:
  build:
    - language: readline
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-readline
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-vue
description: Tree-sitter grammars for html_tags, vue.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-vue
licenses:
  - MIT
languages:
  - html_tags
  - vue
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-vue
treesitter:
  build:
    - language: html_tags
      integrations:
        - neovim
      queries_only: true
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-html_tags
        semver: true
    - language: vue
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-vue
        semver: true
      injections:
        - css
        - javascript
        - pug
        - scss
        - tsx
        - typescript
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-xml
description: Tree-sitter grammars for dtd, xml.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-xml
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-xml
treesitter:
  build:
    - language: dtd
      grammar_dir: dtd
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-dtd
        semver: true
    - language: xml
      grammar_dir: xml
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-xml
        semver: true

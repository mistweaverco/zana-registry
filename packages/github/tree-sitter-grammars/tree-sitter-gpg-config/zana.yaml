# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-gpg-config
description: Tree-sitter grammar for gpg.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-gpg-config
licenses:
  - MIT
languages:
  - gpg
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-gpg-config
treesitter:
  build:
    - language: gpg
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-gpg
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-objc
description: Tree-sitter grammar for objc.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-objc
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-objc
treesitter:
  build:
    - language: objc
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-objc
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-c
          semver: true

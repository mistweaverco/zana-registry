# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-smali
description: Tree-sitter grammar for smali.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-smali
licenses:
  - MIT
languages:
  - smali
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-smali
treesitter:
  build:
    - language: smali
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-smali
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

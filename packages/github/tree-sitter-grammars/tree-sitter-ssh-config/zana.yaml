# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-ssh-config
description: Tree-sitter grammar for ssh_config.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-ssh-config
licenses:
  - MIT
languages:
  - ssh_config
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-ssh-config
treesitter:
  build:
    - language: ssh_config
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-ssh_config
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

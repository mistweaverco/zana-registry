# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-hcl
description: Tree-sitter grammar for hcl and terraform.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-hcl
licenses:
  - MIT
languages:
  - terraform
  - hcl
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-hcl
treesitter:
  build:
    - language: hcl
      grammar_dir: .
    - language: terraform
      grammar_dir: .

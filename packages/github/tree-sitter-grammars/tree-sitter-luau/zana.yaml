# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-luau
description: Tree-sitter grammar for luau.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-luau
licenses:
  - MIT
languages:
  - luau
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-luau
treesitter:
  build:
    - language: luau
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-luau
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-lua
          semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

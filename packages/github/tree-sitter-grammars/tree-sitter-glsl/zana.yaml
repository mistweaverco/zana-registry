# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-glsl
description: Tree-sitter grammar for glsl.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-glsl
licenses:
  - MIT
languages:
  - glsl
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-glsl
treesitter:
  build:
    - language: glsl
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-glsl
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-c
          semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

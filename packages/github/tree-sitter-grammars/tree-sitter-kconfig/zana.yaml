# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-kconfig
description: Tree-sitter grammar for kconfig.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-kconfig
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-kconfig
treesitter:
  build:
    - language: kconfig
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-kconfig
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-cuda
description: Tree-sitter grammar for cuda.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-cuda
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-cuda
treesitter:
  build:
    - language: cuda
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-cuda
          semver: true
        - repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-cpp
          semver: true

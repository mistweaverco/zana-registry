# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-slang
description: Tree-sitter grammar for slang.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-slang
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-slang
treesitter:
  build:
    - language: slang
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-slang
        semver: true

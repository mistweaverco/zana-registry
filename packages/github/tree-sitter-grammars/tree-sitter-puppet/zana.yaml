# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-puppet
description: Tree-sitter grammar for puppet.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-puppet
licenses:
  - MIT
languages:
  - puppet
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-puppet
treesitter:
  build:
    - language: puppet
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-puppet
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

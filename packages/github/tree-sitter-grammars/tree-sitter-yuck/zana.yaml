# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-yuck
description: Tree-sitter grammar for yuck.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-yuck
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-yuck
treesitter:
  build:
    - language: yuck
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-yuck
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-haskell
description: Tree-sitter grammar for haskell.
homepage: https://github.com/tree-sitter-grammars/tree-sitter-haskell
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:tree-sitter-grammars/tree-sitter-haskell
treesitter:
  build:
    - language: haskell
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-haskell
        semver: true

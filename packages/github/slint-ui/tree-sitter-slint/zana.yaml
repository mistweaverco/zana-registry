# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-slint
description: Tree-sitter grammar for slint.
homepage: https://github.com/slint-ui/tree-sitter-slint
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:slint-ui/tree-sitter-slint
treesitter:
  build:
    - language: slint
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-slint
        semver: true

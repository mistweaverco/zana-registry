# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-fennel
description: Tree-sitter grammar for fennel.
homepage: https://github.com/alexmozaidze/tree-sitter-fennel
licenses:
  - MIT
languages:
  - fennel
categories:
  - Tree-sitter-parser
source:
  id: github:alexmozaidze/tree-sitter-fennel
treesitter:
  build:
    - language: fennel
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-fennel
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

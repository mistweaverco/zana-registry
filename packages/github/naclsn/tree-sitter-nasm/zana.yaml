# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-nasm
description: Tree-sitter grammar for nasm.
homepage: https://github.com/naclsn/tree-sitter-nasm
licenses:
  - MIT
languages:
  - nasm
categories:
  - Tree-sitter-parser
source:
  id: github:naclsn/tree-sitter-nasm
treesitter:
  build:
    - language: nasm
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-nasm
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

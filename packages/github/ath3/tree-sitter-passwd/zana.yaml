# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-passwd
description: Tree-sitter grammar for passwd.
homepage: https://github.com/ath3/tree-sitter-passwd
licenses:
  - MIT
languages: []
categories:
  - Tree-sitter-parser
source:
  id: github:ath3/tree-sitter-passwd
treesitter:
  build:
    - language: passwd
      grammar_dir: .
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-passwd
        semver: true

# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-powershell
description: Tree-sitter grammar for powershell.
homepage: https://github.com/airbus-cert/tree-sitter-powershell
licenses:
  - MIT
languages:
  - powershell
categories:
  - Tree-sitter-parser
source:
  id: github:airbus-cert/tree-sitter-powershell
treesitter:
  build:
    - language: powershell
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-powershell
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter

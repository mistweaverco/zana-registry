# yaml-language-server: $schema=https://registry.getzana.net/package.schema.json
---
name: tree-sitter-runescript
description: Tree-sitter grammar for runescript.
homepage: https://github.com/2004Scape/tree-sitter-runescript
licenses:
  - MIT
languages:
  - runescript
categories:
  - Tree-sitter-parser
source:
  id: github:2004Scape/tree-sitter-runescript
treesitter:
  build:
    - language: runescript
      grammar_dir: .
      integrations:
        - neovim
      external_queries:
        repo_url: https://github.com/neovim-treesitter/nvim-treesitter-queries-runescript
        semver: true
requires:
  one:
    - npm:tree-sitter-cli
    - github:tree-sitter/tree-sitter
